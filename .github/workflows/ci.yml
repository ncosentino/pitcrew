name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    name: Runner contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $errors = @(
            Get-ChildItem -Recurse -File -Filter '*.ps1' |
              ForEach-Object {
                $tokens = $null
                $parseErrors = $null
                [System.Management.Automation.Language.Parser]::ParseFile(
                  $_.FullName,
                  [ref]$tokens,
                  [ref]$parseErrors) | Out-Null
                $parseErrors
              }
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Run runner-profile contracts
        shell: pwsh
        run: ./tests/Test-RunnerProfiles.ps1

      - name: Validate Copilot operations plugin
        shell: pwsh
        run: ./tests/Test-CopilotPlugin.ps1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: manager/autoscaler/go.mod
          cache-dependency-path: manager/autoscaler/go.sum

      - name: Run autoscaler tests
        working-directory: manager/autoscaler
        run: |
          go test ./...
          go vet ./...

      - name: Validate manager shell syntax
        run: |
          sh -n manager/manage-runners.sh
          sh -n manager/entrypoint.sh
          sh -n manager/observability.sh
          sh -n manager/reconciliation.sh
          sh -n tests/Test-ManagerReconciliation.sh
          sh -n tests/integration/fake-runner/fake-runner.sh
          bash -n tests/integration/Test-CapacityReconciliation.sh

      - name: Run manager reconciliation contracts
        run: sh ./tests/Test-ManagerReconciliation.sh

      - name: Validate Docker Compose configuration
        run: docker compose --file docker-compose.yml config --quiet

  docker-integration:
    name: Real Docker capacity reconciliation
    needs: contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run real Docker reconciliation
        run: bash ./tests/integration/Test-CapacityReconciliation.sh
