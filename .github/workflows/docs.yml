name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Validate runner contracts
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: ./tests/Test-RunnerProfiles.ps1

      - name: Build documentation
        run: python -m mkdocs build --strict

      - name: Verify Pages origin indexing policy
        run: |
          grep -Fqx 'https://:project.pages.dev/*' site/_headers
          grep -Fqx 'https://:version.:project.pages.dev/*' site/_headers
          test "$(grep -Fxc '  X-Robots-Tag: noindex' site/_headers)" -eq 2

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy site --project-name=pitcrew --branch=main
